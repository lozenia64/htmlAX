<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT채널 AX과제 시연 영상</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #FAFAFA;
      --bg-gradient: linear-gradient(135deg, #FAFAFA 0%, #F5F3FF 40%, #FAFAFA 70%, #EEF2FF 100%);
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e4e4e7;
      --accent: #4F46E5;
      --accent-hover: #4338CA;
      --accent-soft: #EEF2FF;
      --accent-muted: #6366F1;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.05), 0 1px 3px rgba(15, 23, 42, 0.03);
      --shadow-hover: 0 16px 40px rgba(79, 70, 229, 0.1), 0 4px 12px rgba(15, 23, 42, 0.06);
      --duration: 220ms;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans KR", "Noto Sans", sans-serif;
      font-size: clamp(0.9375rem, 0.2vw + 0.9rem, 1rem);
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 20% 10%, rgba(99, 102, 241, 0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.05) 0%, transparent 45%),
        radial-gradient(circle, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
      background-size: auto, auto, 24px 24px;
      background-attachment: fixed;
    }

    button, input[type="range"] {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      min-height: 44px;
      min-width: 44px;
    }

    .view {
      display: none;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .view.is-active {
      display: flex;
      flex-direction: column;
    }

    /* Dashboard */
    .dashboard-hero {
      width: 100%;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dashboard-hero-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 4vw, 2.5rem) clamp(1.5rem, 3vw, 2rem);
    }

    .dashboard-title {
      margin: 0;
      font-size: clamp(1.75rem, 2.5vw + 1rem, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--text);
    }

    .dashboard-subtitle {
      margin: 0.625rem 0 0;
      font-size: clamp(0.9375rem, 0.5vw + 0.875rem, 1.0625rem);
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 36rem;
    }

    .stats-strip {
      display: inline-flex;
      align-items: center;
      margin-top: 1.25rem;
      padding: 0.4375rem 0.875rem;
      background: var(--accent-soft);
      border: 1px solid rgba(79, 70, 229, 0.12);
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .stats-strip[hidden] {
      display: none;
    }

    .dashboard-main {
      flex: 1;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(1.75rem, 4vw, 2.5rem) clamp(1.5rem, 4vw, 2.5rem) clamp(2.5rem, 5vw, 3.5rem);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.25rem;
      padding: clamp(3rem, 8vw, 5rem) 1.5rem;
      max-width: 24rem;
      margin: 2rem auto;
    }

    .empty-state[hidden] {
      display: none;
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .empty-state h2 {
      margin: 0;
      font-size: clamp(1.125rem, 1.5vw + 0.9rem, 1.375rem);
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .empty-state p {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(0.875rem, 0.5vw + 0.8rem, 0.9375rem);
      line-height: 1.6;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius-sm);
      font-weight: 500;
      box-shadow: var(--shadow-sm);
      transition: background var(--duration) var(--ease), transform var(--duration) var(--ease), box-shadow var(--duration) var(--ease);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap: clamp(1.25rem, 2.5vw, 1.75rem);
      width: 100%;
    }

    .card {
      container-type: inline-size;
      container-name: card;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: box-shadow var(--duration) var(--ease), transform var(--duration) var(--ease), border-color var(--duration) var(--ease);
      text-align: left;
      padding: 0;
      width: 100%;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: rgba(79, 70, 229, 0.2);
    }

    .card:hover .card-thumb img {
      transform: scale(1.03);
    }

    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .card-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #e4e4e7 0%, #f4f4f5 100%);
      overflow: hidden;
    }

    .card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(15, 23, 42, 0.55) 0%, rgba(15, 23, 42, 0.1) 40%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .card-badge {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 2;
      padding: 0.25rem 0.625rem;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 999px;
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(79, 70, 229, 0.15);
      pointer-events: none;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 400ms var(--ease);
    }

    .play-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 24px rgba(79, 70, 229, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      opacity: 0;
      transition: opacity var(--duration) var(--ease), transform var(--duration) var(--ease);
      pointer-events: none;
      z-index: 2;
    }

    .card:hover .play-overlay,
    .card:focus-visible .play-overlay {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .thumb-skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .thumb-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .thumb-fallback[hidden],
    .thumb-skeleton[hidden] {
      display: none;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body {
      padding: 1rem 1.125rem 1.25rem;
    }

    .card-title {
      margin: 0;
      font-size: clamp(0.9375rem, 0.5vw + 0.85rem, 1.0625rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @container card (min-width: 320px) {
      .card-body {
        padding: 1.125rem 1.25rem 1.25rem;
      }
      .card-title {
        font-size: clamp(1rem, 0.5vw + 0.9rem, 1.125rem);
      }
    }

    /* Player */
    .player-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-weight: 500;
      transition: background var(--duration) var(--ease);
    }

    .btn-back:hover {
      background: var(--accent-soft);
    }

    .btn-back:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .player-title {
      margin: 0;
      font-size: clamp(1rem, 1vw + 0.9rem, 1.125rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1rem;
      gap: 1rem;
      overflow-y: auto;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 20% 10%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.04) 0%, transparent 45%);
    }

    /* 영상 + 컨트롤(좌)과 PDF(우)를 담는 무대. 기본은 세로 스택(현행 유지) */
    .player-stage {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .player-primary {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }

    /* 데스크톱: PDF 카드는 항상 영상 우측. 접힘=작은 카드, 펼침=읽기 컬럼 */
    @media (min-width: 1024px) {
      .player-main.has-pdf .player-stage {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        max-width: 1560px;
        margin-inline: auto;
      }
      .player-main.has-pdf .player-primary {
        flex: 1 1 auto;
        max-width: 960px;
        min-width: 0;
      }
      /* 접힘: 영상 우측에 작은 카드(헤더만) */
      .player-main.has-pdf #pdf-section {
        flex: 0 0 auto;
        width: 240px;
        max-width: 240px;
        align-self: flex-start;
      }
      /* 펼침: 읽기 컬럼으로 확장, 영상 높이에 맞춰 늘어남 */
      .player-main.is-pdf-open #pdf-section {
        width: clamp(360px, 38%, 680px);
        max-width: 680px;
        align-self: stretch;
        display: flex;
        flex-direction: column;
      }
      .player-main.is-pdf-open .pdf-card-body {
        flex: 1;
        min-height: 0;
      }
      .player-main.is-pdf-open .pdf-slide-view {
        height: auto;
        flex: 1;
        min-height: 320px;
      }
    }

    .video-wrap {
      width: 100%;
      max-width: 960px;
      flex-shrink: 0;
      margin-inline: auto;
      position: relative;
      aspect-ratio: var(--media-aspect, 16 / 9);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      background: transparent;
    }

    /* 원본 해상도 width ≥ 960px 인 영상은 항상 960px 너비로 표시 */
    .video-wrap.is-hd-wide {
      width: min(960px, 100%);
      max-width: 960px;
      max-height: none;
    }

    .player-poster,
    .video-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      object-position: center;
    }

    .player-poster {
      z-index: 2;
      pointer-events: none;
    }

    .player-poster[hidden] {
      display: none;
    }

    .video-wrap video {
      z-index: 1;
    }

    .video-wrap.is-idle video {
      opacity: 0;
      pointer-events: none;
    }

    .player-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 0.9375rem;
      z-index: 3;
    }

    .player-loading[hidden] {
      display: none;
    }

    .controls-dock {
      width: 100%;
      max-width: 960px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 0.5rem 0.75rem 0.625rem;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      max-height: calc((0.875rem * 2 + 1.375rem) * 2);
      overflow: hidden;
      flex-shrink: 0;
    }

    .controls-progress {
      flex-shrink: 0;
      padding: 0.125rem 0;
    }

    /* 시크바 위 챕터 마커 (시각 표시 전용, 입력 방해 없음) */
    .seek-wrap {
      position: relative;
      width: 100%;
    }

    .chapter-markers {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 0;
      pointer-events: none;
    }

    .chapter-marker {
      position: absolute;
      top: 0;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 11px;
      border-radius: 2px;
      background: var(--accent-muted);
      box-shadow: 0 0 0 1.5px var(--surface);
      opacity: 0.55;
      transition: opacity var(--duration) var(--ease), height var(--duration) var(--ease), background var(--duration) var(--ease);
    }

    .chapter-marker.is-active {
      opacity: 1;
      height: 14px;
      background: var(--accent);
    }

    .controls-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 2rem;
      max-height: 2.25rem;
      flex-shrink: 0;
    }

    .btn-play {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
      transition: background var(--duration) var(--ease);
    }

    .btn-play svg {
      width: 14px;
      height: 14px;
    }

    .btn-play:hover {
      background: var(--accent-hover);
    }

    .btn-play:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .seek-bar {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      display: block;
    }

    .seek-bar:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      margin-top: 0;
    }

    .seek-bar::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    .time-display {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 4.5rem;
    }

    .chapters-toolbar {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .chapters-toolbar[hidden] {
      display: none;
    }

    .speed-toolbar {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
      margin-left: auto;
    }

    .btn-speed {
      padding: 0.2rem 0.45rem;
      min-width: 2rem;
      min-height: 1.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-weight: 600;
      font-size: 0.6875rem;
      line-height: 1;
      transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease);
    }

    .btn-speed:hover {
      border-color: var(--accent);
    }

    .btn-speed[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-speed:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .pdf-panel {
      width: 100%;
      max-width: 960px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .pdf-panel[hidden] {
      display: none;
    }

    .pdf-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.875rem 1rem;
      border: 0;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: background var(--duration) var(--ease);
    }

    .pdf-card-header:hover {
      background: var(--surface-hover);
    }

    .pdf-card-header:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .pdf-card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pdf-card-chevron {
      display: inline-flex;
      width: 1.25rem;
      height: 1.25rem;
      color: var(--text-muted);
      transition: transform var(--duration) var(--ease);
      line-height: 1;
    }

    .pdf-card-chevron svg {
      width: 100%;
      height: 100%;
    }

    .pdf-card-header[aria-expanded="true"] .pdf-card-chevron {
      transform: rotate(180deg);
    }

    .pdf-card-body {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .pdf-card-body[hidden] {
      display: none;
    }

    .pdf-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1rem;
      padding: 0.625rem 1rem;
      flex-wrap: wrap;
    }

    .pdf-toolbar h3 {
      display: none;
    }

    .pdf-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-pdf-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1.25rem;
      line-height: 1;
      transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease);
    }

    .btn-pdf-nav:hover:not(:disabled) {
      background: var(--surface-hover);
      border-color: var(--border-strong);
    }

    .btn-pdf-nav:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-pdf-nav:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .pdf-page-info {
      min-width: 4.5rem;
      text-align: center;
      font-size: 0.875rem;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
    }

    .pdf-slide-view {
      position: relative;
      height: min(42vh, 520px);
      background: #525659;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    .pdf-slide-view canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;

    var videoStore = {
      dbName: 'mov-demo-videos',
      storeName: 'videos',
      version: 2,

      openDb: function () {
        return new Promise(function (resolve, reject) {

            var db = e.target.result;

            }
            db.createObjectStore(videoStore.storeName);
          };
          req.onsuccess = function () { resolve(req.result); };
          req.onerror = function () { reject(req.error); };
        });
      },

          return new Promise(function (resolve, reject) {

            var req = tx.objectStore(videoStore.storeName).get(key);
            req.onsuccess = function () {
              var record = req.result;
              if (!record) {
                resolve(null);
                return;
              }
              var blob = record instanceof Blob ? record : record.blob;

    function slugify(name) {

    }

    function formatTime(seconds) {

      fromEmbedded: function (entries) {

    var router = {

        els.pdfLoading.hidden = false;
        var self = this;
        pdfjsLib.getDocument(this.path).promise.then(function (doc) {
          self.doc = doc;
          self.totalPages = doc.numPages;
          return self.renderPage();
        }).catch(function () {
          self.totalPages = null;
          els.pdfPageInfo.textContent = 'PDF 로드 실패';
        }).finally(function () {
          els.pdfLoading.hidden = true;
        });
      },

      open: function (path) {
        this.setup(path);
        this.expand();
      },

      closeDoc: function () {
        if (this.renderTask) {
          try {
            this.renderTask.cancel();
          } catch (e) { /* ignore */ }
          this.renderTask = null;
        }
        if (this.doc) {
          this.doc.destroy();
          this.doc = null;
        }
      },

      close: function () {
        this.closeDoc();
        this.collapse();
        els.pdfSection.hidden = true;
        els.playerMain.classList.remove('has-pdf');
        this.pendingPath = null;
        this.path = null;
        this.page = 1;
        this.totalPages = null;
        this.expanded = false;
        var canvas = els.pdfCanvas;
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.width = 0;
        canvas.height = 0;
      },

      renderPage: function () {
        var self = this;
        if (!this.doc) return Promise.resolve();
        return this.doc.getPage(this.page).then(function (page) {
          if (self.renderTask) {
            try {
              self.renderTask.cancel();
            } catch (e) { /* ignore */ }
          }
          var container = els.pdfSlideView;
          var canvas = els.pdfCanvas;
          var ctx = canvas.getContext('2d');
          var baseViewport = page.getViewport({ scale: 1 });
          var containerWidth = container.clientWidth || 800;
          var containerHeight = container.clientHeight || 400;
          var scale = Math.min(
            containerWidth / baseViewport.width,
            containerHeight / baseViewport.height
          );
          var viewport = page.getViewport({ scale: scale });
          var dpr = window.devicePixelRatio || 1;
          canvas.width = Math.floor(viewport.width * dpr);
          canvas.height = Math.floor(viewport.height * dpr);
          canvas.style.width = Math.floor(viewport.width) + 'px';
          canvas.style.height = Math.floor(viewport.height) + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, viewport.width, viewport.height);
          self.renderTask = page.render({
            canvasContext: ctx,
            viewport: viewport
          });
          return self.renderTask.promise;
        }).then(function () {
          self.updateNav();
        }).catch(function (err) {
          if (err && err.name === 'RenderingCancelledException') return;
        });
      },

      updateNav: function () {
        var label = String(this.page);
        if (this.totalPages) {
          label += ' / ' + this.totalPages;
        }
        els.pdfPageInfo.textContent = label;
        els.pdfPrev.disabled = this.page <= 1;
        els.pdfNext.disabled = this.totalPages ? this.page >= this.totalPages : false;
      },

      prev: function () {
        if (this.page <= 1) return;
        this.page--;

        var self = this;
        this.renderPage().finally(function () {
          els.pdfLoading.hidden = true;
        });
      },

      next: function () {
        if (this.totalPages && this.page >= this.totalPages) return;
        this.page++;
        els.pdfLoading.hidden = false;
        var self = this;
        this.renderPage().finally(function () {
          els.pdfLoading.hidden = true;
        });
      },

      bind: function () {
        var self = this;
        els.pdfCardToggle.addEventListener('click', function () {
          self.toggleExpand();
        });
        els.pdfPrev.addEventListener('click', function (e) {
          e.stopPropagation();
          self.prev();
        });
        els.pdfNext.addEventListener('click', function (e) {
          e.stopPropagation();
          self.next();
        });
        window.addEventListener('resize', function () {
          if (els.pdfSection.hidden || !self.doc || !self.expanded) return;
          self.renderPage();
        });
      }
    };

      /** 영상 길이를 알게 된 시점에 시크바 위 챕터 마커를 배치 (퍼센트 기준) */

        if (this.items.length === 0 || !isFinite(duration) || duration <= 0) return;
        this.items.forEach(function (chapter, index) {
          var pct = Math.max(0, Math.min(100, (chapter.time / duration) * 100));
          var mark = document.createElement('span');

          mark.dataset.index = String(index);

      updateActive: function (currentTime) {

        var buttons = els.chaptersList.querySelectorAll('.btn-chapter');

      cleanup: function () {

      isFullyBuffered: function () {
        var v = els.playerVideo;
        if (!v.duration || !isFinite(v.duration)) return false;
        try {
          for (var i = 0; i < v.buffered.length; i++) {
            if (v.buffered.start(i) <= 0.5 && v.buffered.end(i) >= v.duration - 0.5) {
              return true;
            }
          }
        } catch (e) { /* ignore */ }
        return false;
      },

      updateDownloadProgress: function (loaded, total) {
        if (total > 0) {
          var pct = Math.min(100, Math.round((loaded / total) * 100));
          this.setLoadingText('영상 다운로드 중… ' + pct + '%');
        } else {
          this.setLoadingText('영상 다운로드 중…');
        }
      },

      fetchResponseToBlob: function (response) {
        var self = this;
        var total = parseInt(response.headers.get('Content-Length') || '0', 10);
        var mime = response.headers.get('Content-Type') || 'video/mp4';

        function validateSize(blob) {
          if (total > 0 && Math.abs(blob.size - total) > 4096) {
            throw new Error('incomplete download');
          }
          return { blob: blob, size: blob.size };
        }

        if (!response.body || !response.body.getReader) {
          return response.blob().then(validateSize);
        }
        var reader = response.body.getReader();
        var chunks = [];
        var loaded = 0;
        function pump() {
          return reader.read().then(function (result) {
            if (result.done) {
              return validateSize(new Blob(chunks, { type: mime }));
            }
            chunks.push(result.value);
            loaded += result.value.byteLength;
            self.updateDownloadProgress(loaded, total);
            return pump();
          });
        }
        return pump();
      },

      fetchAndCacheVideo: function (key) {
        var self = this;
        if (key.indexOf('blob:') === 0) {
          sessionBlobUrls[key] = key;
          return Promise.resolve(key);
        }
        return fetch(key).then(function (response) {
          if (!response.ok) {
            throw new Error('download failed');
          }
          self.setLoadingText('영상 다운로드 중… 0%');
          var total = parseInt(response.headers.get('Content-Length') || '0', 10);
          return self.fetchResponseToBlob(response).then(function (result) {
            if (sessionBlobUrls[key]) {
              URL.revokeObjectURL(sessionBlobUrls[key]);
            }
            var blobUrl = URL.createObjectURL(result.blob);
            sessionBlobUrls[key] = blobUrl;
            return videoStore.put(key, result.blob, total || result.size).catch(function () {
              /* 용량 부족 등으로 캐시 실패해도 세션 재생은 계속 */
            }).then(function () {
              return blobUrl;
            });
          });
        });
      },

      resolveBlobUrl: function (key) {
        if (sessionBlobUrls[key]) {
          return Promise.resolve(sessionBlobUrls[key]);
        }
        if (key.indexOf('blob:') === 0) {
          sessionBlobUrls[key] = key;
          return Promise.resolve(key);
        }
        return videoStore.get(key).then(function (entry) {
          if (!entry) return null;
          var blobUrl = URL.createObjectURL(entry.blob);
          sessionBlobUrls[key] = blobUrl;
          return blobUrl;
        }).catch(function () {
          return null;
        });
      },

      attachMediaSource: function (mediaSrc) {
        var self = this;
        var v = els.playerVideo;
        return new Promise(function (resolve, reject) {
          var settled = false;

          function finish() {
            if (settled) return;
            if (!v.duration || !isFinite(v.duration)) return;
            if (v.readyState < 3) return;
            settled = true;
            cleanup();
            self.markMetadataReady();
            self.applyVideoAspect();
            state.videoReady = true;
            els.playerLoading.hidden = true;
            self.resetLoadingText();
            resolve();
          }

          function cleanup() {
            v.removeEventListener('loadedmetadata', onMeta);
            v.removeEventListener('progress', onProgress);
            v.removeEventListener('canplaythrough', onProgress);
            v.removeEventListener('error', onError);
          }

          function onMeta() {
            self.markMetadataReady();
            self.applyVideoAspect();
          }

          function onProgress() {
            if (v.buffered.length > 0 && v.duration) {
              var buffered = v.buffered.end(v.buffered.length - 1);
              var pct = Math.min(100, Math.round((buffered / v.duration) * 100));
              self.setLoadingText('영상 준비 중… ' + pct + '%');
            }
            finish();
          }

          function onError() {
            if (settled) return;
            settled = true;
            cleanup();
            reject(new Error('video load failed'));
          }

          v.preload = 'auto';
          v.src = mediaSrc;
          v.addEventListener('loadedmetadata', onMeta, { once: true });
          v.addEventListener('progress', onProgress);
          v.addEventListener('canplaythrough', onProgress, { once: true });
          v.addEventListener('error', onError, { once: true });
        });
      },

      finishPrepare: function () {
        state.isBuffering = false;
        var callbacks = state.bufferCallbacks.slice();
        state.bufferCallbacks = [];
        callbacks.forEach(function (cb) {
          cb();
        });
      },

      failPrepare: function (message) {
        state.isBuffering = false;
        state.bufferCallbacks = [];
        state.videoReady = false;
        els.playerLoading.hidden = true;
        this.resetLoadingText();
        if (message) {
          els.playerTitle.textContent += ' (' + message + ')';
        }
      },

      /** 영상 전체 다운로드(또는 캐시) 후 재생; 실패 시 직접 URL 스트리밍 폴백 */
      prepareVideoSource: function (callback) {
        var self = this;
        var key = state.pendingSrc;

        if (!key) {
          callback();
          return;
        }

        if (state.videoSourceAttached === key && state.videoReady && els.playerVideo.src) {
          callback();
          return;
        }

        if (state.isBuffering) {
          state.bufferCallbacks.push(callback);
          return;
        }

        state.isBuffering = true;
        state.bufferCallbacks = [callback];
        els.playerLoading.hidden = false;

        function runAttach(mediaSrc) {
          state.videoSourceAttached = key;
          return self.attachMediaSource(mediaSrc);
        }

        if (location.protocol === 'file:') {
          self.setLoadingText('영상 불러오는 중…');
          runAttach(key).then(function () {
            self.finishPrepare();
          }).catch(function () {
            self.failPrepare('로컬 파일 재생 실패');
          });
          return;
        }

        self.resolveBlobUrl(key).then(function (blobUrl) {
          if (blobUrl) {
            self.setLoadingText('저장된 영상 불러오는 중…');
            return blobUrl;
          }
          return self.fetchAndCacheVideo(key);
        }).then(function (mediaSrc) {
          return runAttach(mediaSrc);
        }).then(function () {
          self.finishPrepare();
        }).catch(function () {
          self.setLoadingText('직접 스트리밍으로 재생 중…');
          return runAttach(key);
        }).then(function () {
          if (state.isBuffering) {
            self.finishPrepare();
          }
        }).catch(function () {
          self.failPrepare('다운로드 실패');
        });
      },

      markMetadataReady: function () {
        var v = els.playerVideo;
        if (state.metadataReady) return;
        state.metadataReady = true;
        els.playerLoading.hidden = true;
        var d = v.duration || 0;
        if (d > 0) {
          els.seekBar.max = String(d);
          els.seekBar.disabled = false;
          chapters.renderMarkers();
        }
      },

      ensureReady: function (callback) {
        this.prepareVideoSource(callback);
      },

      performSeek: function (targetTime, shouldPlay) {
        var self = this;
        var v = els.playerVideo;
        if (!state.videoReady) return;
        var d = v.duration || 0;
        targetTime = Math.max(0, d > 0 ? Math.min(targetTime, d) : targetTime);

        state.seeking = true;
        els.seekBar.value = String(targetTime);
        els.timeDisplay.textContent = formatTime(targetTime) + ' / ' + formatTime(d);
        chapters.updateActive(targetTime);

        function afterSeek() {
          state.seeking = false;
          v.muted = false;
          self.updateSeek();
          chapters.updateActive(v.currentTime);
          routing.syncTime();
          els.playerLoading.hidden = true;
          if (shouldPlay) {
            v.play().catch(function () {});
          } else {
            v.pause();
          }
        }

        if (Math.abs(v.currentTime - targetTime) < 0.05) {
          afterSeek();
          return;
        }

        v.addEventListener('seeked', afterSeek, { once: true });
        v.currentTime = targetTime;
      },

      seekToTime: function (time, shouldPlay) {
        var self = this;
        this.ensureReady(function () {
          self.performSeek(time, shouldPlay);
        });
      },

      updatePlayIcon: function () {
        var playing = !els.playerVideo.paused;
        els.iconPlay.hidden = playing;
        els.iconPause.hidden = !playing;
        els.btnPlay.setAttribute('aria-label', playing ? '일시정지' : '재생');
      },

      updateSeek: function () {
        if (state.seeking) return;
        var t = els.playerVideo.currentTime;
        var d = els.playerVideo.duration || 0;
        els.seekBar.value = String(t);
        els.timeDisplay.textContent = formatTime(t) + ' / ' + formatTime(d);
      },

      togglePlay: function () {
        var v = els.playerVideo;
        if (!v.paused) {
          v.pause();
          return;
        }
        this.seekToTime(v.currentTime || 0, true);
      },

      reset: function () {
        state.seeking = false;
        state.metadataReady = false;
        state.videoReady = false;
        speed.set(1);
        els.seekBar.max = '100';
        els.seekBar.disabled = true;
        this.updatePlayIcon();
        els.seekBar.value = '0';
        els.timeDisplay.textContent = '0:00 / --:--';
        chapters.clear();
      },

      bind: function () {
        var self = this;

        els.btnBack.addEventListener('click', function () {
          routing.goToDashboard();
        });

        els.btnPlay.addEventListener('click', function () {
          self.togglePlay();
        });

        els.playerVideo.addEventListener('loadedmetadata', function () {
          player.markMetadataReady();
          player.applyVideoAspect();
          player.updateSeek();
        });

        els.playerVideo.addEventListener('waiting', function () {
          if (state.metadataReady) {
            els.playerLoading.hidden = false;
          }
        });

        els.playerVideo.addEventListener('playing', function () {
          els.playerLoading.hidden = true;
          player.resetLoadingText();
          els.playerVideo.muted = false;
          player.hidePoster();
        });

        els.playerVideo.addEventListener('play', function () {
          self.updatePlayIcon();
        });

        els.playerVideo.addEventListener('pause', function () {
          self.updatePlayIcon();
        });

        els.playerVideo.addEventListener('timeupdate', function () {
          self.updateSeek();
          chapters.updateActive(els.playerVideo.currentTime);
          routing.syncTime();
        });

        els.playerVideo.addEventListener('ended', function () {
          self.updatePlayIcon();
        });

        els.playerVideo.addEventListener('error', function () {
          els.playerLoading.hidden = true;
          els.playerTitle.textContent += ' (재생 실패)';
        });

        els.seekBar.addEventListener('input', function () {
          state.seeking = true;
          var t = parseFloat(els.seekBar.value);
          var d = parseFloat(els.seekBar.max) || 0;
          els.timeDisplay.textContent = formatTime(t) + ' / ' + formatTime(d);
          chapters.updateActive(t);
        });

        els.seekBar.addEventListener('change', function () {
          var t = parseFloat(els.seekBar.value);
          var wasPlaying = !els.playerVideo.paused;
          player.seekToTime(t, wasPlaying);
        });

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && els.viewPlayer.classList.contains('is-active')) {
            routing.goToDashboard();
          }
          if (e.key === ' ' && els.viewPlayer.classList.contains('is-active') &&
              document.activeElement && document.activeElement.tagName !== 'INPUT') {
            e.preventDefault();
            self.togglePlay();
          }
          if (!els.pdfSection.hidden && els.viewPlayer.classList.contains('is-active')) {
            if (e.key === 'ArrowLeft') {
              e.preventDefault();
              pdfViewer.prev();
            } else if (e.key === 'ArrowRight') {
              e.preventDefault();
              pdfViewer.next();
            }
          }
        });
      },

      pause: function () {
        els.playerVideo.pause();
        this.updatePlayIcon();
      }
    };

    function init() {
      state.videos = catalog.fromEmbedded(VIDEOS);
      dashboard.render();
      dashboard.bindFolderPicker();
      speed.bind();
      player.bind();
      pdfViewer.bind();
      routing.bind();

      if (state.videos.length === 0) {
        els.emptyState.hidden = false;
      }

      // 초기 해시(#video=…)가 있으면 해당 영상으로 바로 진입
      routing.apply();
    }

    init();
  })();
  </script>
</body>
</html>
