<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT채널 AX과제 시연 영상</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #FAFAFA;
      --bg-gradient: linear-gradient(135deg, #FAFAFA 0%, #F5F3FF 40%, #FAFAFA 70%, #EEF2FF 100%);
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e4e4e7;
      --accent: #4F46E5;
      --accent-hover: #4338CA;
      --accent-soft: #EEF2FF;
      --accent-muted: #6366F1;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.05), 0 1px 3px rgba(15, 23, 42, 0.03);
      --shadow-hover: 0 16px 40px rgba(79, 70, 229, 0.1), 0 4px 12px rgba(15, 23, 42, 0.06);
      --duration: 220ms;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans KR", "Noto Sans", sans-serif;
      font-size: clamp(0.9375rem, 0.2vw + 0.9rem, 1rem);
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 20% 10%, rgba(99, 102, 241, 0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.05) 0%, transparent 45%),
        radial-gradient(circle, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
      background-size: auto, auto, 24px 24px;
      background-attachment: fixed;
    }

    button, input[type="range"] {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      min-height: 44px;
      min-width: 44px;
    }

    .view {
      display: none;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .view.is-active {
      display: flex;
      flex-direction: column;
    }

    /* Dashboard */
    .dashboard-hero {
      width: 100%;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dashboard-hero-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 4vw, 2.5rem) clamp(1.5rem, 3vw, 2rem);
    }

    .dashboard-title {
      margin: 0;
      font-size: clamp(1.75rem, 2.5vw + 1rem, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--text);
    }

    .dashboard-subtitle {
      margin: 0.625rem 0 0;
      font-size: clamp(0.9375rem, 0.5vw + 0.875rem, 1.0625rem);
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 36rem;
    }

    .stats-strip {
      display: inline-flex;
      align-items: center;
      margin-top: 1.25rem;
      padding: 0.4375rem 0.875rem;
      background: var(--accent-soft);
      border: 1px solid rgba(79, 70, 229, 0.12);
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .stats-strip[hidden] {
      display: none;
    }

    .dashboard-main {
      flex: 1;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(1.75rem, 4vw, 2.5rem) clamp(1.5rem, 4vw, 2.5rem) clamp(2.5rem, 5vw, 3.5rem);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.25rem;
      padding: clamp(3rem, 8vw, 5rem) 1.5rem;
      max-width: 24rem;
      margin: 2rem auto;
    }

    .empty-state[hidden] {
      display: none;
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .empty-state h2 {
      margin: 0;
      font-size: clamp(1.125rem, 1.5vw + 0.9rem, 1.375rem);
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .empty-state p {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(0.875rem, 0.5vw + 0.8rem, 0.9375rem);
      line-height: 1.6;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius-sm);
      font-weight: 500;
      box-shadow: var(--shadow-sm);
      transition: background var(--duration) var(--ease), transform var(--duration) var(--ease), box-shadow var(--duration) var(--ease);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap: clamp(1.25rem, 2.5vw, 1.75rem);
      width: 100%;
    }

    .card {
      container-type: inline-size;
      container-name: card;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: box-shadow var(--duration) var(--ease), transform var(--duration) var(--ease), border-color var(--duration) var(--ease);
      text-align: left;
      padding: 0;
      width: 100%;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: rgba(79, 70, 229, 0.2);
    }

    .card:hover .card-thumb img {
      transform: scale(1.03);
    }

    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .card-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #e4e4e7 0%, #f4f4f5 100%);
      overflow: hidden;
    }

    .card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(15, 23, 42, 0.55) 0%, rgba(15, 23, 42, 0.1) 40%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .card-badges {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 2;
      display: flex;
      gap: 0.375rem;
      pointer-events: none;
    }

    .card-badge {
      padding: 0.25rem 0.625rem;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 999px;
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(79, 70, 229, 0.15);
    }

    .card-badge.is-pdf {
      color: #dc2626;
      border-color: rgba(220, 38, 38, 0.18);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 400ms var(--ease);
    }

    .play-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 24px rgba(79, 70, 229, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      opacity: 0;
      transition: opacity var(--duration) var(--ease), transform var(--duration) var(--ease);
      pointer-events: none;
      z-index: 2;
    }

    .card:hover .play-overlay,
    .card:focus-visible .play-overlay {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .thumb-skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .thumb-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .thumb-fallback[hidden],
    .thumb-skeleton[hidden] {
      display: none;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body {
      padding: 1rem 1.125rem 1.25rem;
    }

    .card-title {
      margin: 0;
      font-size: clamp(0.9375rem, 0.5vw + 0.85rem, 1.0625rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @container card (min-width: 320px) {
      .card-body {
        padding: 1.125rem 1.25rem 1.25rem;
      }
      .card-title {
        font-size: clamp(1rem, 0.5vw + 0.9rem, 1.125rem);
      }
    }

    /* Catalog toolbar: 검색 + 카테고리 필터 + 정렬 */
    .catalog-toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      margin-bottom: clamp(1.5rem, 3vw, 2rem);
    }

    .catalog-toolbar[hidden] {
      display: none;
    }

    .search-field {
      position: relative;
      display: flex;
      align-items: center;
      flex: 1 1 240px;
      min-width: 200px;
      max-width: 26rem;
    }

    .search-field svg.search-icon {
      position: absolute;
      left: 0.875rem;
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 0.625rem 2.25rem 0.625rem 2.5rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.9375rem;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--duration) var(--ease), box-shadow var(--duration) var(--ease);
      -webkit-appearance: none;
      appearance: none;
    }

    .search-input::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .search-clear {
      position: absolute;
      right: 0.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      min-width: 28px;
      min-height: 28px;
      border-radius: 50%;
      color: var(--text-muted);
      transition: background var(--duration) var(--ease), color var(--duration) var(--ease);
    }

    .search-clear[hidden] {
      display: none;
    }

    .search-clear:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .search-clear:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .category-chips {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      flex: 1 1 auto;
      min-width: 0;
    }

    .category-chips[hidden] {
      display: none;
    }

    .chip {
      padding: 0.4rem 0.875rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      min-height: 2rem;
      transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease);
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .chip:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .sort-field {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: auto;
    }

    .sort-select {
      padding: 0.5rem 2rem 0.5rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      -webkit-appearance: none;
      appearance: none;
      min-height: 2.25rem;
    }

    .sort-select:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .sort-field::after {
      content: '';
      position: absolute;
      right: 0.875rem;
      width: 0.5rem;
      height: 0.5rem;
      border-right: 2px solid var(--text-muted);
      border-bottom: 2px solid var(--text-muted);
      transform: translateY(-25%) rotate(45deg);
      pointer-events: none;
    }

    /* 이어보기 셸프 */
    .continue-section {
      margin-bottom: clamp(2rem, 4vw, 2.75rem);
    }

    .continue-section[hidden] {
      display: none;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .section-title {
      margin: 0;
      font-size: clamp(1.125rem, 1vw + 0.9rem, 1.375rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .text-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.375rem 0.625rem;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 0.8125rem;
      font-weight: 600;
      min-height: auto;
      min-width: auto;
      transition: background var(--duration) var(--ease), color var(--duration) var(--ease);
    }

    .text-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .text-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .continue-row {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(min(80%, 280px), 1fr);
      gap: clamp(1rem, 2vw, 1.5rem);
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 0.5rem;
      scroll-snap-type: x proximity;
      scrollbar-width: thin;
    }

    .continue-row .card {
      scroll-snap-align: start;
    }

    #grid-heading {
      margin: 0 0 1rem;
    }

    #grid-heading[hidden] {
      display: none;
    }

    .no-results {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.75rem;
      padding: clamp(2.5rem, 6vw, 4rem) 1.5rem;
      color: var(--text-muted);
    }

    .no-results[hidden] {
      display: none;
    }

    .no-results svg {
      width: 40px;
      height: 40px;
      opacity: 0.7;
    }

    .no-results p {
      margin: 0;
      font-size: 0.9375rem;
    }

    /* 카드 진행률 표시 */
    .card-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.35);
      z-index: 2;
    }

    .card-progress[hidden] {
      display: none;
    }

    .card-progress-fill {
      height: 100%;
      width: 0;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .card-status {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      z-index: 2;
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: rgba(15, 23, 42, 0.72);
      color: #fff;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: none;
    }

    .card-status[hidden] {
      display: none;
    }

    .card-status.is-done {
      background: rgba(22, 163, 74, 0.88);
    }

    /* 캐시 상태 핀(카드 좌하단) */
    .card-cache {
      position: absolute;
      left: 0.75rem;
      bottom: 0.75rem;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: rgba(15, 23, 42, 0.66);
      color: #fff;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: none;
    }

    .card-cache[hidden] {
      display: none;
    }

    .card-cache.is-cached {
      background: rgba(22, 163, 74, 0.9);
    }

    /* 캐시 바(대시보드 헤더) */
    .cache-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.625rem 0.875rem;
      margin-top: 1.25rem;
    }

    .cache-bar[hidden] {
      display: none;
    }

    .btn-cache {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(79, 70, 229, 0.2);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.8125rem;
      font-weight: 600;
      min-height: 2.25rem;
      box-shadow: var(--shadow-sm);
      transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease);
    }

    .btn-cache svg {
      width: 16px;
      height: 16px;
    }

    .btn-cache:hover:not(:disabled) {
      background: #fff;
      border-color: var(--accent);
    }

    .btn-cache:disabled {
      cursor: default;
    }

    .btn-cache.is-complete {
      background: rgba(22, 163, 74, 0.1);
      border-color: rgba(22, 163, 74, 0.3);
      color: #15803d;
    }

    .btn-cache.is-running {
      background: #fff;
      border-color: var(--accent);
    }

    .btn-cache:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .prefetch-progress {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1 1 200px;
      min-width: 160px;
      max-width: 24rem;
    }

    .prefetch-progress[hidden] {
      display: none;
    }

    .prefetch-track {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      overflow: hidden;
    }

    .prefetch-fill {
      height: 100%;
      width: 0;
      background: var(--accent);
      border-radius: 3px;
      transition: width 200ms var(--ease);
    }

    .prefetch-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      max-width: 14rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .storage-info {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .storage-info[hidden] {
      display: none;
    }

    /* Player */
    .player-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-weight: 500;
      transition: background var(--duration) var(--ease);
    }

    .btn-back:hover {
      background: var(--accent-soft);
    }

    .btn-back:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .player-title {
      margin: 0;
      font-size: clamp(1rem, 1vw + 0.9rem, 1.125rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1rem;
      gap: 1rem;
      overflow-y: auto;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 20% 10%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.04) 0%, transparent 45%);
    }

    /* 영상 + 컨트롤(좌)과 PDF(우)를 담는 무대. 기본은 세로 스택(현행 유지) */
    .player-stage {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .player-primary {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }

    /* 데스크톱: PDF 카드는 항상 영상 우측. 접힘=작은 카드, 펼침=읽기 컬럼 */
    @media (min-width: 1024px) {
      .player-main.has-pdf .player-stage {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        max-width: 1560px;
        margin-inline: auto;
      }
      .player-main.has-pdf .player-primary {
        flex: 1 1 auto;
        max-width: 960px;
        min-width: 0;
      }
      /* 접힘: 영상 우측 '중앙'에 떠 있는 원형 문서 버튼
         (#pdf-section 높이를 영상 높이에 맞춰 JS로 동기화 → FAB가 영상 세로 중앙에 정렬) */
      .player-main.has-pdf:not(.is-pdf-open) #pdf-section {
        flex: 0 0 auto;
        width: auto;
        max-width: none;
        align-self: flex-start;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        box-shadow: none;
        overflow: visible;
      }
      .player-main.has-pdf:not(.is-pdf-open) .pdf-card-header {
        width: 56px;
        min-width: 56px;
        height: 56px;
        padding: 0;
        border-radius: 50%;
        justify-content: center;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-md);
        color: var(--accent);
        transition: background var(--duration) var(--ease), box-shadow var(--duration) var(--ease), transform var(--duration) var(--ease);
      }
      .player-main.has-pdf:not(.is-pdf-open) .pdf-card-header:hover {
        background: var(--accent-soft);
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
      }
      .player-main.has-pdf:not(.is-pdf-open) .pdf-card-title,
      .player-main.has-pdf:not(.is-pdf-open) .pdf-card-chevron {
        display: none;
      }
      .player-main.has-pdf:not(.is-pdf-open) .pdf-card-icon {
        display: inline-flex;
      }
      /* 펼침: 읽기 컬럼으로 확장, 영상 높이에 맞춰 늘어남 */
      .player-main.is-pdf-open #pdf-section {
        flex: 0 0 auto;
        width: clamp(360px, 38%, 680px);
        max-width: 680px;
        align-self: stretch;
        display: flex;
        flex-direction: column;
      }
      .player-main.is-pdf-open .pdf-card-body {
        flex: 1;
        min-height: 0;
      }
      .player-main.is-pdf-open .pdf-slide-view {
        height: auto;
        flex: 1;
        min-height: 320px;
      }
    }

    .video-wrap {
      width: 100%;
      max-width: 960px;
      flex-shrink: 0;
      margin-inline: auto;
      position: relative;
      aspect-ratio: var(--media-aspect, 16 / 9);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      background: transparent;
      cursor: pointer;
    }

    /* 원본 해상도 width ≥ 960px 인 영상은 항상 960px 너비로 표시 */
    .video-wrap.is-hd-wide {
      width: min(960px, 100%);
      max-width: 960px;
      max-height: none;
    }

    .player-poster,
    .video-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      object-position: center;
    }

    .player-poster {
      z-index: 2;
      pointer-events: none;
    }

    .player-poster[hidden] {
      display: none;
    }

    .video-wrap video {
      z-index: 1;
    }

    .video-wrap.is-idle video {
      opacity: 0;
      pointer-events: none;
    }

    .player-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 0.9375rem;
      z-index: 3;
    }

    .player-loading[hidden] {
      display: none;
    }

    .controls-dock {
      width: 100%;
      max-width: 960px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 0.5rem 0.75rem 0.625rem;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      max-height: calc((0.875rem * 2 + 1.375rem) * 2);
      overflow: hidden;
      flex-shrink: 0;
    }

    .controls-progress {
      flex-shrink: 0;
      padding: 0.125rem 0;
    }

    /* 시크바 위 챕터 마커 (시각 표시 전용, 입력 방해 없음) */
    .seek-wrap {
      position: relative;
      width: 100%;
    }

    .chapter-markers {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 0;
      pointer-events: none;
    }

    .chapter-marker {
      position: absolute;
      top: 0;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 11px;
      border-radius: 2px;
      background: var(--accent-muted);
      box-shadow: 0 0 0 1.5px var(--surface);
      opacity: 0.55;
      transition: opacity var(--duration) var(--ease), height var(--duration) var(--ease), background var(--duration) var(--ease);
    }

    .chapter-marker.is-active {
      opacity: 1;
      height: 14px;
      background: var(--accent);
    }

    .controls-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 2rem;
      max-height: 2.25rem;
      flex-shrink: 0;
    }

    .btn-play {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
      transition: background var(--duration) var(--ease);
    }

    .btn-play svg {
      width: 14px;
      height: 14px;
    }

    .btn-play:hover {
      background: var(--accent-hover);
    }

    .btn-play:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .seek-bar {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      display: block;
    }

    .seek-bar:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      margin-top: 0;
    }

    .seek-bar::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    .time-display {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 4.5rem;
    }

    .chapters-toolbar {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .chapters-toolbar[hidden] {
      display: none;
    }

    .speed-toolbar {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
      margin-left: auto;
    }

    .btn-speed {
      padding: 0.2rem 0.45rem;
      min-width: 2rem;
      min-height: 1.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-weight: 600;
      font-size: 0.6875rem;
      line-height: 1;
      transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease);
    }

    .btn-speed:hover {
      border-color: var(--accent);
    }

    .btn-speed[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-speed:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .pdf-panel {
      width: 100%;
      max-width: 960px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .pdf-panel[hidden] {
      display: none;
    }

    .pdf-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.875rem 1rem;
      border: 0;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: background var(--duration) var(--ease);
    }

    .pdf-card-header:hover {
      background: var(--surface-hover);
    }

    .pdf-card-header:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .pdf-card-title {
      font-size: 0.9375rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pdf-card-icon {
      display: none;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .pdf-card-icon svg {
      width: 24px;
      height: 24px;
    }

    .pdf-card-chevron {
      display: inline-flex;
      width: 1.25rem;
      height: 1.25rem;
      color: var(--text-muted);
      transition: transform var(--duration) var(--ease);
      line-height: 1;
    }

    .pdf-card-chevron svg {
      width: 100%;
      height: 100%;
    }

    .pdf-card-header[aria-expanded="true"] .pdf-card-chevron {
      transform: rotate(180deg);
    }

    .pdf-card-body {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .pdf-card-body[hidden] {
      display: none;
    }

    .pdf-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1rem;
      padding: 0.625rem 1rem;
      flex-wrap: wrap;
    }

    .pdf-toolbar h3 {
      display: none;
    }

    .pdf-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-pdf-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1.25rem;
      line-height: 1;
      transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease);
    }

    .btn-pdf-nav:hover:not(:disabled) {
      background: var(--surface-hover);
      border-color: var(--border-strong);
    }

    .btn-pdf-nav:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-pdf-nav:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .pdf-page-info {
      min-width: 4.5rem;
      text-align: center;
      font-size: 0.875rem;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
    }

    .pdf-slide-view {
      position: relative;
      height: min(42vh, 520px);
      background: #525659;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    .pdf-slide-view canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }

    .pdf-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(82, 86, 89, 0.85);
      color: #fff;
      font-size: 0.9375rem;
    }

    .pdf-loading[hidden] {
      display: none;
    }

    .chapters-scroll {
      display: flex;
      gap: 0.375rem;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      height: 100%;
      align-items: center;
    }

    .chapters-scroll::-webkit-scrollbar {
      display: none;
    }

    .btn-chapter {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.6875rem;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
      min-height: 1.75rem;
      transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), color var(--duration) var(--ease);
    }

    .btn-chapter:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .btn-chapter.is-active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-chapter:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .chapter-time {
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      font-size: 0.625rem;
      font-weight: 600;
    }

    .btn-chapter.is-active .chapter-time {
      color: rgba(255, 255, 255, 0.85);
    }

    #folder-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 1023px) {
      body::before {
        content: '이 대시보드는 PC(화면 너비 1024px 이상)에서 이용해 주세요.';
        display: block;
        padding: 0.75rem 1rem;
        background: #fef3c7;
        color: #92400e;
        text-align: center;
        font-size: 0.875rem;
        border-bottom: 1px solid #fcd34d;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .card:hover {
        transform: none;
      }
      .card:hover .card-thumb img {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="view-dashboard" class="view is-active" role="region" aria-label="대시보드">
    <header class="dashboard-hero">
      <div class="dashboard-hero-inner">
        <h1 class="dashboard-title">IT채널 AX과제 시연 영상</h1>
        <p class="dashboard-subtitle">시연 영상을 선택하여 시청하세요</p>
        <div id="stats-strip" class="stats-strip" hidden>
          <span id="stats-count"></span>
        </div>
        <div id="cache-bar" class="cache-bar" hidden>
          <button type="button" id="btn-prefetch" class="btn-cache">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span id="prefetch-label">모든 시연 미리 받기</span>
          </button>
          <div id="prefetch-progress" class="prefetch-progress" hidden>
            <div class="prefetch-track"><div id="prefetch-fill" class="prefetch-fill"></div></div>
            <span id="prefetch-text" class="prefetch-text"></span>
          </div>
          <span id="storage-info" class="storage-info" hidden></span>
          <button type="button" id="btn-clear-cache" class="text-btn" hidden>전체 캐시 비우기</button>
        </div>
      </div>
    </header>
    <main class="dashboard-main">
      <div id="empty-state" class="empty-state" hidden>
        <div class="empty-state-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M10 9l5 3-5 3V9z" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <h2>재생할 동영상이 없습니다</h2>
        <p>아래 버튼으로 동영상이 있는 폴더를 선택해 주세요.</p>
        <button type="button" id="btn-pick-folder" class="btn-primary">폴더 선택</button>
      </div>

      <div id="catalog-toolbar" class="catalog-toolbar" hidden>
        <div class="search-field">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="search" id="search-input" class="search-input" placeholder="시연 영상 검색…" aria-label="시연 영상 검색" autocomplete="off">
          <button type="button" id="search-clear" class="search-clear" aria-label="검색어 지우기" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="category-chips" class="category-chips" role="group" aria-label="카테고리 필터" hidden></div>
        <label class="sort-field">
          <span class="sr-only">정렬 기준</span>
          <select id="sort-select" class="sort-select">
            <option value="default">기본순</option>
            <option value="title">제목순</option>
            <option value="recent">최근 시청순</option>
          </select>
        </label>
      </div>

      <section id="continue-section" class="continue-section" aria-label="이어보기" hidden>
        <div class="section-head">
          <h2 class="section-title">이어보기</h2>
          <button type="button" id="continue-clear" class="text-btn">시청 기록 지우기</button>
        </div>
        <div id="continue-row" class="continue-row" role="list"></div>
      </section>

      <h2 id="grid-heading" class="section-title" hidden>전체 시연 영상</h2>
      <div id="card-grid" class="card-grid" role="list"></div>
      <div id="no-results" class="no-results" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>검색 결과가 없습니다. 다른 검색어나 카테고리를 선택해 보세요.</p>
      </div>
    </main>
  </div>

  <div id="view-player" class="view" role="region" aria-label="플레이어">
    <header class="player-header">
      <button type="button" id="btn-back" class="btn-back" aria-label="목록으로 돌아가기">← 목록으로</button>
      <h2 id="player-title" class="player-title"></h2>
    </header>
    <main class="player-main">
      <div class="player-stage">
        <div class="player-primary">
      <div class="video-wrap" id="video-wrap">
        <img id="player-poster" class="player-poster" alt="" hidden>
        <video id="player-video" playsinline preload="none"></video>
        <div id="player-loading" class="player-loading" hidden>불러오는 중…</div>
      </div>
      <div class="controls-dock">
        <div class="controls-progress">
          <div class="seek-wrap">
            <input type="range" id="seek-bar" class="seek-bar" min="0" max="100" value="0" step="0.01" aria-label="재생 위치">
            <div id="chapter-markers" class="chapter-markers" aria-hidden="true"></div>
          </div>
        </div>
        <div class="controls-toolbar">
          <button type="button" id="btn-play" class="btn-play" aria-label="재생">
            <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" hidden>
              <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
            </svg>

    /**
     * 시청 진행률 — localStorage 영구 저장 (오프라인/내부망 동작).
     * 키: slug(임베디드 영상만). picker(blob) 영상은 세션 한정이라 저장 안 함.
     * 값: { t: 초, d: 총길이, at: 타임스탬프 }
     */
    var progress = {
      storeKey: 'mov-demo-progress',
      cache: null,
      lastSavedT: -1,
      /** 시청 완료로 간주하는 비율(이 이상이면 이어보기에서 제외) */
      DONE_RATIO: 0.97,
      /** 이어보기로 기록을 남기기 시작하는 최소 재생 초 */
      MIN_RESUME: 5,

      loadAll: function () {
        if (this.cache) return this.cache;
        try {
          this.cache = JSON.parse(localStorage.getItem(this.storeKey) || '{}') || {};
        } catch (e) {
          this.cache = {};
        }
        return this.cache;
      },

      persist: function () {
        try {
          localStorage.setItem(this.storeKey, JSON.stringify(this.cache || {}));
        } catch (e) { /* 용량 초과 등은 무시 */ }
      },

      get: function (slug) {
        if (!slug) return null;
        return this.loadAll()[slug] || null;
      },

      set: function (slug, t, d) {
        if (!slug) return;
        var all = this.loadAll();
        all[slug] = { t: Math.floor(t), d: Math.floor(d) || 0, at: Date.now() };
        this.cache = all;
        this.persist();
      },

      remove: function (slug) {
        if (!slug) return;
        var all = this.loadAll();
        if (all[slug]) {
          delete all[slug];
          this.persist();
        }
      },

      clearAll: function () {
        this.cache = {};
        this.persist();
      },

      /** 0~1 진행 비율. 완료(거의 끝)면 null 반환 → 이어보기 미노출 */
      ratio: function (slug) {
        var p = this.get(slug);
        if (!p || !p.d) return null;
        var r = Math.max(0, Math.min(1, p.t / p.d));
        return r >= this.DONE_RATIO ? null : r;
      },

      isDone: function (slug) {
        var p = this.get(slug);
        if (!p || !p.d) return false;
        return (p.t / p.d) >= this.DONE_RATIO;
      },

      /** timeupdate 시 호출 — 정수 초가 바뀔 때만 저장 */
      saveCurrent: function () {
        if (state.currentIndex < 0) return;
        var video = state.videos[state.currentIndex];
        if (!video || !video.slug) return;
        var v = els.playerVideo;
        var t = Math.floor(v.currentTime || 0);
        if (t === this.lastSavedT) return;
        this.lastSavedT = t;
        var d = v.duration || 0;
        if (!isFinite(d) || d <= 0) return;
        if ((t / d) >= this.DONE_RATIO || t >= d - 1) {
          // 거의 다 봄 → 완료로 기록(이어보기 제외, 카드엔 '시청 완료')
          this.set(video.slug, d, d);
        } else if (t >= this.MIN_RESUME) {
          this.set(video.slug, t, d);
        }
      }
    };

        els.continueRow.innerHTML = '';
        var entries = [];
        state.videos.forEach(function (video, index) {
          if (!video.slug || progress.ratio(video.slug) === null) return;

        var entries = [];
        state.videos.forEach(function (video, index) {
          if (self.matches(video)) entries.push({ video: video, index: index });
        });

        if (this.filter.sort === 'title') {
          entries.sort(function (a, b) {
            return a.video.title.localeCompare(b.video.title, 'ko');

        } else if (this.filter.sort === 'recent') {
          entries.sort(function (a, b) {

          return response.blob().then(validateSize);
        }
        var reader = response.body.getReader();
        var chunks = [];
        var loaded = 0;
        function pump() {
          return reader.read().then(function (result) {
            if (result.done) {
              return validateSize(new Blob(chunks, { type: mime }));
            }
            chunks.push(result.value);
            loaded += result.value.byteLength;
            report(loaded);
            return pump();
          });
        }
        return pump();
      },

      fetchAndCacheVideo: function (key) {
        var self = this;
        if (key.indexOf('blob:') === 0) {
          sessionBlobUrls[key] = key;
          return Promise.resolve(key);
        }
        return fetch(key).then(function (response) {
          if (!response.ok) {
            throw new Error('download failed');
          }
          self.setLoadingText('영상 다운로드 중… 0%');
          var total = parseInt(response.headers.get('Content-Length') || '0', 10);
          return self.fetchResponseToBlob(response).then(function (result) {
            if (sessionBlobUrls[key]) {
              URL.revokeObjectURL(sessionBlobUrls[key]);
            }
            var blobUrl = URL.createObjectURL(result.blob);
            sessionBlobUrls[key] = blobUrl;
            return videoStore.put(key, result.blob, total || result.size).catch(function () {
              /* 용량 부족 등으로 캐시 실패해도 세션 재생은 계속 */
            }).then(function () {
              return blobUrl;
            });
          });
        });
      },

      resolveBlobUrl: function (key) {
        if (sessionBlobUrls[key]) {
          return Promise.resolve(sessionBlobUrls[key]);
        }
        if (key.indexOf('blob:') === 0) {
          sessionBlobUrls[key] = key;
          return Promise.resolve(key);
        }
        return videoStore.get(key).then(function (entry) {
          if (!entry) return null;
          var blobUrl = URL.createObjectURL(entry.blob);
          sessionBlobUrls[key] = blobUrl;
          return blobUrl;
        }).catch(function () {
          return null;
        });
      },

      attachMediaSource: function (mediaSrc) {
        var self = this;
        var v = els.playerVideo;
        return new Promise(function (resolve, reject) {
          var settled = false;

          function finish() {
            if (settled) return;
            if (!v.duration || !isFinite(v.duration)) return;
            if (v.readyState < 3) return;
            settled = true;
            cleanup();
            self.markMetadataReady();
            self.applyVideoAspect();
            state.videoReady = true;
            els.playerLoading.hidden = true;
            self.resetLoadingText();
            resolve();
          }

          function cleanup() {
            v.removeEventListener('loadedmetadata', onMeta);
            v.removeEventListener('progress', onProgress);
            v.removeEventListener('canplaythrough', onProgress);
            v.removeEventListener('error', onError);
          }

          function onMeta() {
            self.markMetadataReady();
            self.applyVideoAspect();
          }

          function onProgress() {
            if (v.buffered.length > 0 && v.duration) {
              var buffered = v.buffered.end(v.buffered.length - 1);
              var pct = Math.min(100, Math.round((buffered / v.duration) * 100));
              self.setLoadingText('영상 준비 중… ' + pct + '%');
            }
            finish();
          }

          function onError() {
            if (settled) return;
            settled = true;
            cleanup();
            reject(new Error('video load failed'));
          }

          v.preload = 'auto';
          v.src = mediaSrc;
          v.addEventListener('loadedmetadata', onMeta, { once: true });
          v.addEventListener('progress', onProgress);
          v.addEventListener('canplaythrough', onProgress, { once: true });
          v.addEventListener('error', onError, { once: true });
        });
      },

      finishPrepare: function () {
        state.isBuffering = false;
        var callbacks = state.bufferCallbacks.slice();
        state.bufferCallbacks = [];
        callbacks.forEach(function (cb) {
          cb();
        });
      },

      failPrepare: function (message) {
        state.isBuffering = false;
        state.bufferCallbacks = [];
        state.videoReady = false;
        els.playerLoading.hidden = true;
        this.resetLoadingText();
        if (message) {
          els.playerTitle.textContent += ' (' + message + ')';
        }
      },

      /** 영상 전체 다운로드(또는 캐시) 후 재생; 실패 시 직접 URL 스트리밍 폴백 */
      prepareVideoSource: function (callback) {
        var self = this;
        var key = state.pendingSrc;

        if (!key) {
          callback();
          return;
        }

        if (state.videoSourceAttached === key && state.videoReady && els.playerVideo.src) {
          callback();
          return;
        }

        if (state.isBuffering) {
          state.bufferCallbacks.push(callback);
          return;
        }

        state.isBuffering = true;
        state.bufferCallbacks = [callback];
        els.playerLoading.hidden = false;

        function runAttach(mediaSrc) {
          state.videoSourceAttached = key;
          return self.attachMediaSource(mediaSrc);
        }

        if (location.protocol === 'file:') {
          self.setLoadingText('영상 불러오는 중…');
          runAttach(key).then(function () {
            self.finishPrepare();
          }).catch(function () {
            self.failPrepare('로컬 파일 재생 실패');
          });
          return;
        }

        self.resolveBlobUrl(key).then(function (blobUrl) {
          if (blobUrl) {
            self.setLoadingText('저장된 영상 불러오는 중…');
            return blobUrl;
          }
          return self.fetchAndCacheVideo(key);
        }).then(function (mediaSrc) {
          return runAttach(mediaSrc);
        }).then(function () {
          self.finishPrepare();
        }).catch(function () {
          self.setLoadingText('직접 스트리밍으로 재생 중…');
          return runAttach(key);
        }).then(function () {
          if (state.isBuffering) {
            self.finishPrepare();
          }
        }).catch(function () {
          self.failPrepare('다운로드 실패');
        });
      },

      markMetadataReady: function () {
        var v = els.playerVideo;
        if (state.metadataReady) return;
        state.metadataReady = true;
        els.playerLoading.hidden = true;
        var d = v.duration || 0;
        if (d > 0) {
          els.seekBar.max = String(d);
          els.seekBar.disabled = false;
          chapters.renderMarkers();
        }
      },

      ensureReady: function (callback) {
        this.prepareVideoSource(callback);
      },

      performSeek: function (targetTime, shouldPlay) {
        var self = this;
        var v = els.playerVideo;
        if (!state.videoReady) return;
        var d = v.duration || 0;
        targetTime = Math.max(0, d > 0 ? Math.min(targetTime, d) : targetTime);

        state.seeking = true;
        els.seekBar.value = String(targetTime);
        els.timeDisplay.textContent = formatTime(targetTime) + ' / ' + formatTime(d);
        chapters.updateActive(targetTime);

        function afterSeek() {
          state.seeking = false;
          v.muted = false;
          self.updateSeek();
          chapters.updateActive(v.currentTime);
          routing.syncTime();
          els.playerLoading.hidden = true;
          if (shouldPlay) {
            v.play().catch(function () {});
          } else {
            v.pause();
          }
        }

        if (Math.abs(v.currentTime - targetTime) < 0.05) {
          afterSeek();
          return;
        }

        v.addEventListener('seeked', afterSeek, { once: true });
        v.currentTime = targetTime;
      },

      seekToTime: function (time, shouldPlay) {
        var self = this;
        this.ensureReady(function () {
          self.performSeek(time, shouldPlay);
        });
      },

      updatePlayIcon: function () {
        var playing = !els.playerVideo.paused;
        els.iconPlay.hidden = playing;
        els.iconPause.hidden = !playing;
        els.btnPlay.setAttribute('aria-label', playing ? '일시정지' : '재생');
      },

      updateSeek: function () {
        if (state.seeking) return;
        var t = els.playerVideo.currentTime;
        var d = els.playerVideo.duration || 0;
        els.seekBar.value = String(t);
        els.timeDisplay.textContent = formatTime(t) + ' / ' + formatTime(d);
      },

      togglePlay: function () {
        var v = els.playerVideo;
        if (!v.paused) {
          v.pause();
          return;
        }
        this.seekToTime(v.currentTime || 0, true);
      },

      reset: function () {
        state.seeking = false;
        state.metadataReady = false;
        state.videoReady = false;
        speed.set(1);
        els.seekBar.max = '100';
        els.seekBar.disabled = true;
        this.updatePlayIcon();
        els.seekBar.value = '0';
        els.timeDisplay.textContent = '0:00 / --:--';
        chapters.clear();
      },

      bind: function () {
        var self = this;

        els.btnBack.addEventListener('click', function () {
          routing.goToDashboard();
        });

        els.btnPlay.addEventListener('click', function () {
          self.togglePlay();
        });

        els.videoWrap.addEventListener('click', function () {
          self.togglePlay();
        });

        els.playerVideo.addEventListener('loadedmetadata', function () {
          player.markMetadataReady();
          player.applyVideoAspect();
          player.updateSeek();
        });

        els.playerVideo.addEventListener('waiting', function () {
          if (state.metadataReady) {
            els.playerLoading.hidden = false;
          }
        });

        els.playerVideo.addEventListener('playing', function () {
          els.playerLoading.hidden = true;
          player.resetLoadingText();
          els.playerVideo.muted = false;
          player.hidePoster();
        });

        els.playerVideo.addEventListener('play', function () {
          self.updatePlayIcon();
        });

        els.playerVideo.addEventListener('pause', function () {
          self.updatePlayIcon();
          progress.saveCurrent();
        });

        els.playerVideo.addEventListener('timeupdate', function () {
          self.updateSeek();
          chapters.updateActive(els.playerVideo.currentTime);
          routing.syncTime();
          progress.saveCurrent();
        });

        els.playerVideo.addEventListener('ended', function () {
          self.updatePlayIcon();
          progress.saveCurrent();
        });

        els.playerVideo.addEventListener('error', function () {
          els.playerLoading.hidden = true;
          els.playerTitle.textContent += ' (재생 실패)';
        });

        els.seekBar.addEventListener('input', function () {
          state.seeking = true;
          var t = parseFloat(els.seekBar.value);
          var d = parseFloat(els.seekBar.max) || 0;
          els.timeDisplay.textContent = formatTime(t) + ' / ' + formatTime(d);
          chapters.updateActive(t);
        });

        els.seekBar.addEventListener('change', function () {
          var t = parseFloat(els.seekBar.value);
          var wasPlaying = !els.playerVideo.paused;
          player.seekToTime(t, wasPlaying);
        });

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && els.viewPlayer.classList.contains('is-active')) {
            routing.goToDashboard();
          }
          if (e.key === ' ' && els.viewPlayer.classList.contains('is-active') &&
              document.activeElement && document.activeElement.tagName !== 'INPUT') {
            e.preventDefault();
            self.togglePlay();
          }
          if (!els.pdfSection.hidden && els.viewPlayer.classList.contains('is-active')) {
            if (e.key === 'ArrowLeft') {
              e.preventDefault();
              pdfViewer.prev();
            } else if (e.key === 'ArrowRight') {
              e.preventDefault();
              pdfViewer.next();
            }
          }
        });
      },

      pause: function () {
        els.playerVideo.pause();
        this.updatePlayIcon();
      }
    };

    function formatBytes(n) {
      if (!n || n < 0) return '0 B';
      var units = ['B', 'KB', 'MB', 'GB', 'TB'];
      var i = 0;
      var v = n;
      while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
      return (v >= 10 || i === 0 ? Math.round(v) : v.toFixed(1)) + ' ' + units[i];
    }

    /**
     * 오프라인 시연 안정성 — IndexedDB 캐시 가시화 + 일괄 사전 다운로드(프리페치).
     * 캐시 키는 영상 경로(video.src)와 동일(기존 fetchAndCacheVideo 와 호환).
     * file:// 환경은 fetch 프리페치가 불가하므로 비활성화.
     */
    var cacheManager = {
      cachedKeys: {},
      disabled: location.protocol === 'file:',
      running: false,
      aborter: null,

      /** 캐시 대상(임베디드, blob 아님) 영상 목록 */
      cacheableVideos: function () {
        return state.videos.filter(function (v) {
          return v.source === 'embedded' && v.src && v.src.indexOf('blob:') !== 0;
        });
      },

      /** IndexedDB 키 목록으로 메모리 캐시맵 갱신 */
      refresh: function () {
        var self = this;
        if (this.disabled) {
          this.cachedKeys = {};
          return Promise.resolve();
        }
        return videoStore.keys().then(function (keys) {
          var map = {};
          keys.forEach(function (k) { map[k] = true; });
          self.cachedKeys = map;
        }).catch(function () {
          self.cachedKeys = self.cachedKeys || {};
        });
      },

      isCached: function (key) {
        return !!(this.cachedKeys && this.cachedKeys[key]);
      },

      estimate: function () {
        if (!navigator.storage || !navigator.storage.estimate) {
          return Promise.resolve(null);
        }
        return navigator.storage.estimate().catch(function () { return null; });
      },

      /** 단일 영상 다운로드 후 IndexedDB 저장 */
      download: function (key, onProgress, signal) {
        var opts = signal ? { signal: signal } : undefined;
        return fetch(key, opts).then(function (response) {
          if (!response.ok) throw new Error('download failed ' + response.status);
          var total = parseInt(response.headers.get('Content-Length') || '0', 10);
          return player.fetchResponseToBlob(response, onProgress).then(function (result) {
            return videoStore.put(key, result.blob, total || result.size);
          });
        });
      },

      /** 미저장 영상 전체를 순차 다운로드. handlers 로 진행 상황 콜백 */
      prefetchAll: function (handlers) {
        var self = this;
        handlers = handlers || {};
        if (this.running || this.disabled) return;
        var targets = this.cacheableVideos().filter(function (v) {
          return !self.isCached(v.src);
        });
        if (targets.length === 0) {
          if (handlers.onEmpty) handlers.onEmpty();
          return;
        }
        this.running = true;
        this.aborter = ('AbortController' in window) ? new AbortController() : null;
        var signal = this.aborter ? this.aborter.signal : null;
        var done = 0;
        var failed = 0;
        if (handlers.onStart) handlers.onStart(targets.length);

        function step(i) {
          if (!self.running) {
            if (handlers.onAbort) handlers.onAbort(done, targets.length);
            self.finishRun();
            return;
          }
          if (i >= targets.length) {
            if (handlers.onDone) handlers.onDone(done, failed, targets.length);
            self.finishRun();
            return;
          }
          var v = targets[i];
          if (handlers.onItemStart) handlers.onItemStart(i, targets.length, v);
          self.download(v.src, function (loaded, total) {
            var pct = total > 0 ? Math.round(loaded / total * 100) : 0;
            if (handlers.onItemProgress) handlers.onItemProgress(i, targets.length, v, pct);
          }, signal).then(function () {
            done++;
            self.cachedKeys[v.src] = true;
            if (handlers.onItemDone) handlers.onItemDone(v);
          }).catch(function () {
            if (signal && signal.aborted) {
              self.running = false;
            } else {
              failed++;
            }
          }).then(function () {
            step(i + 1);
          });
        }
        step(0);
      },

      finishRun: function () {
        this.running = false;
        this.aborter = null;
      },

      abort: function () {
        if (!this.running) return;
        this.running = false;
        if (this.aborter) {
          try { this.aborter.abort(); } catch (e) { /* ignore */ }
        }
      },

      clearAll: function () {
        var self = this;
        return videoStore.keys().then(function (keys) {
          return Promise.all(keys.map(function (k) {
            return videoStore.remove(k);
          }));
        }).then(function () {
          Object.keys(sessionBlobUrls).forEach(function (k) {
            if (k.indexOf('blob:') !== 0) {
              try { URL.revokeObjectURL(sessionBlobUrls[k]); } catch (e) { /* ignore */ }
              delete sessionBlobUrls[k];
            }
          });
          state.videoSourceAttached = null;
          self.cachedKeys = {};
        });
      }
    };

    var cacheBar = {
      bind: function () {
        els.btnPrefetch.addEventListener('click', function () {
          if (cacheManager.running) {
            cacheManager.abort();
          } else {
            cacheBar.startPrefetch();
          }
        });
        els.btnClearCache.addEventListener('click', function () {
          if (cacheManager.running) return;
          if (!window.confirm('저장된 모든 영상 캐시를 삭제할까요? 다음 재생 시 다시 받습니다.')) return;
          cacheManager.clearAll().then(function () {
            return cacheManager.refresh();
          }).then(function () {
            dashboard.refreshCacheBadges();
            cacheBar.updateSummary();
          });
        });
      },

      /** 대시보드 렌더 시 호출: 바 노출 여부 + 비동기 캐시 상태 반영 */
      refresh: function () {
        if (cacheManager.disabled || cacheManager.cacheableVideos().length === 0) {
          els.cacheBar.hidden = true;
          return;
        }
        els.cacheBar.hidden = false;
        cacheManager.refresh().then(function () {
          dashboard.refreshCacheBadges();
          cacheBar.updateSummary();
        });
      },

      updateSummary: function () {
        if (cacheManager.running) return;
        var cacheable = cacheManager.cacheableVideos();
        var total = cacheable.length;
        var cached = 0;
        cacheable.forEach(function (v) {
          if (cacheManager.cachedKeys[v.src]) cached++;
        });
        var allCached = total > 0 && cached === total;

        els.btnPrefetch.disabled = allCached;
        els.btnPrefetch.classList.toggle('is-complete', allCached);
        els.btnPrefetch.classList.remove('is-running');
        els.prefetchLabel.textContent = allCached ? '모든 시연 저장됨' : '모든 시연 미리 받기';
        els.prefetchProgress.hidden = true;
        els.btnClearCache.hidden = cached === 0;

        cacheManager.estimate().then(function (est) {
          var parts = ['영상 ' + cached + '/' + total + '개 저장'];
          if (est && est.usage) parts.push(formatBytes(est.usage) + ' 사용');
          els.storageInfo.textContent = parts.join(' · ');
          els.storageInfo.hidden = false;
        });
      },

      startPrefetch: function () {
        cacheManager.prefetchAll({
          onStart: function (n) {
            els.btnPrefetch.classList.remove('is-complete');
            els.btnPrefetch.classList.add('is-running');
            els.prefetchLabel.textContent = '받기 중단';
            els.prefetchProgress.hidden = false;
            els.btnClearCache.hidden = true;
            cacheBar.setProgress(0, '0 / ' + n);
          },
          onItemStart: function (i, n, v) {
            cacheBar.setProgress(Math.round(i / n * 100), (i + 1) + ' / ' + n + ' · ' + v.title);
          },
          onItemProgress: function (i, n, v, pct) {
            var overall = Math.round(((i + pct / 100) / n) * 100);
            cacheBar.setProgress(overall, (i + 1) + ' / ' + n + ' · ' + pct + '%');
          },
          onItemDone: function () {
            dashboard.refreshCacheBadges();
          },
          onDone: function (done, failed) {
            cacheBar.endPrefetch(failed > 0 ? (failed + '개 실패') : null);
          },
          onAbort: function () {
            cacheBar.endPrefetch('중단됨');
          }
        });
      },

      setProgress: function (pct, text) {
        els.prefetchFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
        els.prefetchText.textContent = text || '';
      },

      endPrefetch: function (note) {
        cacheManager.refresh().then(function () {
          dashboard.refreshCacheBadges();
          cacheBar.updateSummary();
          if (note) {
            els.storageInfo.textContent = note + ' · ' + els.storageInfo.textContent;
          }
        });
      }
    };

    function init() {
      state.videos = catalog.fromEmbedded(VIDEOS);
      dashboard.render();
      dashboard.bindControls();
      dashboard.bindFolderPicker();
      cacheBar.bind();
      speed.bind();
      player.bind();
      pdfViewer.bind();
      routing.bind();

      if (state.videos.length === 0) {
        els.emptyState.hidden = false;
      }

      // 초기 해시(#video=…)가 있으면 해당 영상으로 바로 진입
      routing.apply();
    }

    init();
  })();
  </script>
</body>
</html>
